<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Configurações do GitHub</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 15px;
      width: 300px;
      background-color: #f6f8fa;
    }
    h3 { margin-top: 0; color: #24292f; }
    label { font-size: 13px; font-weight: bold; color: #24292f; display: block; margin-bottom: 5px; }
    input { 
      width: 100%; 
      margin-bottom: 15px; 
      padding: 8px; 
      box-sizing: border-box; 
      border: 1px solid #d0d7de;
      border-radius: 6px;
    }
    button { 
      width: 100%; 
      padding: 10px; 
      background-color: #2da44e; 
      color: white; 
      border: none; 
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer; 
    }
    button:hover { background-color: #2c974b; }
    #status { color: #2da44e; font-size: 13px; margin-top: 10px; text-align: center; font-weight: bold; }
  </style>
</head>
<body>
  <h3>Configuração do GitHub</h3>
  
  <label for="gh-token">Personal Access Token:</label>
  <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
  
  <label for="gh-repo">Repositório (usuario/repo):</label>
  <input type="text" id="gh-repo" placeholder="seunome/nome-do-repo">
  
  <button id="btn-save">Salvar Configurações</button>
  <p id="status"></p>

  <script src="popup.js"></script>
</body>
</html>
